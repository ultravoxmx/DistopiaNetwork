<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DISTOPIA — Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #080b0f;
      --bg2:       #0d1117;
      --bg3:       #111820;
      --border:    #1e2d3d;
      --accent:    #00c8ff;
      --accent2:   #ff4d6d;
      --accent3:   #39ff14;
      --text:      #c9d6e3;
      --text-dim:  #4a6070;
      --text-mid:  #7a96a8;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow Condensed', sans-serif;
      --body:      'Barlow', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scanline overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1000;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
    }

    /* ── Noise grain ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,11,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 64px;
    }

    .logo {
      font-family: var(--sans);
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: #fff;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo span {
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent);
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 8px var(--accent3);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Search ── */
    .search-wrap {
      flex: 1;
      max-width: 520px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.55rem 1rem 0.55rem 2.6rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,200,255,0.12);
    }

    .search-wrap input::placeholder { color: var(--text-dim); }

    .search-icon {
      position: absolute; left: 0.75rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.85rem;
      pointer-events: none;
    }

    /* ── Nav links ── */
    .nav-links {
      display: flex;
      gap: 0.25rem;
      margin-left: auto;
    }

    .nav-btn {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      background: transparent;
      cursor: pointer;
      text-decoration: none;
      display: flex; align-items: center; gap: 0.4rem;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Hero band ── */
    .hero {
      background: linear-gradient(135deg, #060c14 0%, #091420 60%, #060c14 100%);
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: 'DISTOPIA';
      position: absolute;
      right: -1rem; top: -1rem;
      font-family: var(--sans);
      font-weight: 900;
      font-size: 9rem;
      color: rgba(255,255,255,0.018);
      letter-spacing: 0.05em;
      pointer-events: none;
      user-select: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 1px;
      max-width: 900px;
    }

    .hero-stat {
      background: var(--bg3);
      padding: 1rem 1.2rem;
      border: 1px solid var(--border);
    }

    .hero-stat:first-child { border-radius: 4px 0 0 4px; }
    .hero-stat:last-child  { border-radius: 0 4px 4px 0; }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .stat-value {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
    }

    .stat-value.accent  { color: var(--accent);  text-shadow: 0 0 10px rgba(0,200,255,0.4); }
    .stat-value.accent2 { color: var(--accent2); text-shadow: 0 0 10px rgba(255,77,109,0.4); }
    .stat-value.accent3 { color: var(--accent3); text-shadow: 0 0 10px rgba(57,255,20,0.4); }

    /* ── Main layout ── */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    /* ── Section header ── */
    .section-head {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
    }

    .section-count {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Sort/filter bar ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-chip {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-chip:hover,
    .filter-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,200,255,0.06);
    }

    /* ── Podcast grid ── */
    .podcast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    /* ── Podcast card ── */
    .podcast-card {
      background: var(--bg2);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
    }

    .podcast-card:hover { background: var(--bg3); }

    .podcast-card:hover .card-play-overlay { opacity: 1; }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg3);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-thumb-bg {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      font-weight: 900;
      font-size: 3.5rem;
      color: rgba(255,255,255,0.06);
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #0a1520, #0d1d2e);
      position: relative;
      overflow: hidden;
    }

    .card-thumb-bg::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse at 30% 40%,
        rgba(0,200,255,0.08) 0%,
        transparent 60%
      );
    }

    .card-thumb-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .card-thumb-line.red    { background: linear-gradient(90deg, var(--accent2), transparent); }
    .card-thumb-line.green  { background: linear-gradient(90deg, var(--accent3), transparent); }

    .card-duration {
      position: absolute;
      bottom: 0.5rem; right: 0.5rem;
      background: rgba(0,0,0,0.85);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      color: #fff;
    }

    .card-play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .play-btn-big {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(0,200,255,0.5);
    }

    .play-btn-big svg { margin-left: 3px; }

    .card-body {
      padding: 0.9rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
    }

    .card-title {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.3;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--text-mid);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: auto;
      padding-top: 0.5rem;
    }

    .card-hash {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .card-badge {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
      border: 1px solid;
      flex-shrink: 0;
    }

    .card-badge.cached {
      border-color: var(--accent3);
      color: var(--accent3);
    }

    .card-badge.remote {
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 5rem 2rem;
      grid-column: 1 / -1;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .empty-title {
      font-family: var(--sans);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-mid);
      margin-bottom: 0.5rem;
    }

    .empty-sub {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    /* ── Loading state ── */
    .loading-row {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      padding: 3rem;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .footer-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 6px var(--accent3);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--bg3);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 0.7rem 1.2rem;
      border-radius: 3px;
      z-index: 9999;
      transform: translateY(6px);
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .hero-grid { grid-template-columns: 1fr 1fr; }
      header { padding: 0 1rem; gap: 1rem; }
      .main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <a href="/" class="logo">
    <div class="logo-dot"></div>
    DISTO<span>PIA</span>
  </a>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search podcasts, descriptions..." autocomplete="off" />
  </div>

  <nav class="nav-links">
    <a href="/swagger" class="nav-btn">⚙ API</a>
    <a href="/status" class="nav-btn">◉ Status</a>
  </nav>
</header>

<!-- ── Hero stats ───────────────────────────────────────────────────────────── -->
<div class="hero">
  <div class="hero-grid" id="statsGrid">
    <div class="hero-stat">
      <div class="stat-label">Podcasts</div>
      <div class="stat-value accent" id="statTotal">—</div>
    </div>
    <div class="hero-stat">
      <div class="stat-label">Cached</div>
      <div class="stat-value accent3" id="statCached">—</div>
    </div>
    <div class="hero-stat">
      <div class="stat-label">Server ID</div>
      <div class="stat-value" id="statServer" style="font-size:1rem; font-family: var(--mono);">—</div>
    </div>
    <div class="hero-stat">
      <div class="stat-label">Network Time</div>
      <div class="stat-value" id="statTime" style="font-size:0.95rem; font-family: var(--mono);">—</div>
    </div>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<main class="main">

  <div class="section-head">
    <span class="section-title">Catalog</span>
    <span class="section-count" id="resultCount"></span>
    <div class="section-line"></div>
  </div>

  <div class="filter-bar">
    <button class="filter-chip active" data-sort="newest">▼ Newest</button>
    <button class="filter-chip" data-sort="oldest">▲ Oldest</button>
    <button class="filter-chip" data-sort="longest">⏱ Longest</button>
    <button class="filter-chip" data-sort="shortest">⏱ Shortest</button>
    <button class="filter-chip" data-sort="az">A–Z</button>
  </div>

  <div class="podcast-grid" id="podcastGrid">
    <div class="loading-row"><div class="spinner"></div></div>
  </div>

</main>

<!-- ── Footer ───────────────────────────────────────────────────────────────── -->
<footer>
  <div class="footer-status">
    <div class="status-dot"></div>
    <span id="footerServerId">NODE ONLINE</span>
  </div>
  <span>DISTOPIA DISTRIBUTED PODCAST NETWORK · DECENTRALIZED</span>
  <span id="footerTime"></span>
</footer>

<div id="toast"></div>

<script>
  // ── Color accent cycling per card
  const ACCENTS = ['blue', 'red', 'green', 'blue', 'green', 'red'];

  // ── State
  let allPodcasts = [];
  let currentSort = 'newest';
  let searchQuery = '';

  // ── Format helpers
  function fmtDuration(sec) {
    if (!sec) return '0:00';
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function truncateHash(hash) {
    if (!hash) return '';
    return hash.substring(0, 8) + '…' + hash.substring(hash.length - 6);
  }

  // ── Get accent color variant
  function accentVariant(index) {
    const v = index % 3;
    if (v === 1) return 'red';
    if (v === 2) return 'green';
    return '';
  }

  // ── Build a card element
  function buildCard(p, index) {
    const variant = accentVariant(index);
    const initials = (p.title || 'EP').substring(0, 2).toUpperCase();

    const a = document.createElement('a');
    a.className = 'podcast-card';
    a.href = `/podcast.html?id=${encodeURIComponent(p.podcast_id)}`;

    a.innerHTML = `
      <div class="card-thumb">
        <div class="card-thumb-bg">${initials}</div>
        <div class="card-thumb-line ${variant}"></div>
        <div class="card-duration">${fmtDuration(p.duration_seconds)}</div>
        <div class="card-play-overlay">
          <div class="play-btn-big">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#000">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(p.title || 'Untitled')}</div>
        <div class="card-desc">${escHtml(p.description || 'No description.')}</div>
        <div class="card-meta">
          <span class="card-hash">${truncateHash(p.file_hash)}</span>
          <span class="card-badge remote">remote</span>
        </div>
      </div>
    `;
    return a;
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Sort podcasts
  function sortPodcasts(arr, mode) {
    const copy = [...arr];
    if (mode === 'newest')   return copy.sort((a,b) => (b.publish_timestamp||0) - (a.publish_timestamp||0));
    if (mode === 'oldest')   return copy.sort((a,b) => (a.publish_timestamp||0) - (b.publish_timestamp||0));
    if (mode === 'longest')  return copy.sort((a,b) => (b.duration_seconds||0) - (a.duration_seconds||0));
    if (mode === 'shortest') return copy.sort((a,b) => (a.duration_seconds||0) - (b.duration_seconds||0));
    if (mode === 'az')       return copy.sort((a,b) => (a.title||'').localeCompare(b.title||''));
    return copy;
  }

  // ── Filter podcasts
  function filterPodcasts(arr, q) {
    if (!q) return arr;
    const lq = q.toLowerCase();
    return arr.filter(p =>
      (p.title||'').toLowerCase().includes(lq) ||
      (p.description||'').toLowerCase().includes(lq) ||
      (p.podcast_id||'').toLowerCase().includes(lq)
    );
  }

  // ── Render grid
  function renderGrid() {
    const grid = document.getElementById('podcastGrid');
    const filtered = filterPodcasts(sortPodcasts(allPodcasts, currentSort), searchQuery);

    document.getElementById('resultCount').textContent =
      `${filtered.length} of ${allPodcasts.length}`;

    grid.innerHTML = '';

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">◎</div>
          <div class="empty-title">${allPodcasts.length === 0 ? 'No podcasts yet' : 'No results found'}</div>
          <div class="empty-sub">${allPodcasts.length === 0
            ? 'Use the Publisher Client to publish the first episode.'
            : 'Try a different search query.'}</div>
        </div>`;
      return;
    }

    filtered.forEach((p, i) => grid.appendChild(buildCard(p, i)));
  }

  // ── Load catalog
  async function loadCatalog() {
    try {
      const res = await fetch('/podcasts');
      if (!res.ok) throw new Error(res.statusText);
      allPodcasts = await res.json();
      renderGrid();
    } catch (e) {
      document.getElementById('podcastGrid').innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠</div>
          <div class="empty-title">Connection Error</div>
          <div class="empty-sub">${e.message}</div>
        </div>`;
      showToast('Failed to load catalog: ' + e.message);
    }
  }

  // ── Load server status
  async function loadStatus() {
    try {
      const res = await fetch('/status');
      if (!res.ok) return;
      const s = await res.json();
      document.getElementById('statTotal').textContent  = s.catalogSize ?? '—';
      document.getElementById('statCached').textContent = s.cachedFiles ?? '—';
      document.getElementById('statServer').textContent = s.serverId   ?? '—';
      document.getElementById('footerServerId').textContent = 'NODE · ' + (s.serverId ?? '').toUpperCase();
    } catch { /* ignore */ }
  }

  // ── Clock
  function updateClock() {
    const now = new Date();
    const t = now.toISOString().substring(11, 19);
    document.getElementById('statTime').textContent  = t;
    document.getElementById('footerTime').textContent = now.toUTCString().substring(0, 25);
  }

  // ── Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Sort chips
  document.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      renderGrid();
    });
  });

  // ── Search
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      renderGrid();
    }, 200);
  });

  // ── Init
  loadCatalog();
  loadStatus();
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(loadStatus, 10000);
  setInterval(loadCatalog, 30000);
</script>
</body>
</html>
